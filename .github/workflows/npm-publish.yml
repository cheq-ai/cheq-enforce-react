# This workflow will run tests using node and then publish a package to NPM when a version tag is pushed
# Uses Trusted Publishing (OIDC) - no NPM_TOKEN secret required
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'       # Matches 1.0.0, 2.1.3, etc.
      - '[0-9]+.[0-9]+.[0-9]+-*'     # Matches 1.0.0-beta.1, 2.0.0-rc.1, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
      - run: npm ci
      - run: npm run build
      - run: npm -w source/cheq-enforce-react test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC / Trusted Publishing
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm run build
      - name: Publish to NPM
        run: npm -w source/cheq-enforce-react publish --provenance --access public
